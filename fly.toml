app = "ohttp-relay"
primary_region = "iad"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"

[env]
  GATEWAY_URL = "https://gateway.ohttp.info/ohttp"
  MAX_REQUEST_SIZE = "1048576"
  CORS_ORIGIN = "*"
