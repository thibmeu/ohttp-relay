[build]
  edge_functions = "netlify/edge-functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[[edge_functions]]
  path = "/*"
  function = "netlify"

[template.environment]
  GATEWAY_URL = { required = true, description = "OHTTP gateway URL (e.g. https://gateway.ohttp.info/ohttp)" }
  CORS_ORIGIN = { description = "Allowed CORS origin (default: *)" }
